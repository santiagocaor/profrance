<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profesor de Francés IA</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
  <link rel="stylesheet" href="./style.css">
</head>

<body>
  <div class="app-container">
    <aside class="sidebar">
      <div class="logo">
        <h1><span class="material-symbols-outlined logo-icon">flag</span> Francés IA</h1>
        <p>Profesor Nativo IA</p>
      </div>
      <button id="close-sidebar-btn" class="mobile-only-btn" title="Cerrar Menú"><span class="material-symbols-outlined">close</span></button>
      
      <h3 class="sidebar-section-title">Módulos</h3>
      <nav id="module-nav">
        <!-- Generado dinámicamente -->
      </nav>

      <div class="settings">
        <label for="api-key">Gemini API Key:</label>
        <input type="password" id="api-key" placeholder="Pega tu API Key aquí">
        <div class="settings-actions" style="margin-top: 0.8rem; display: flex; gap: 0.5rem;">
          <button id="export-btn" class="btn-primary" style="margin-top: 0; padding: 0.5rem; font-size: 0.85rem; background: var(--bg-color); color: var(--text-primary); border: 1px solid var(--border-color); display: flex; align-items: center; justify-content: center; gap: 0.2rem;" title="Exportar Lecciones"><span class="material-symbols-outlined">download</span> Exportar</button>
          <button id="import-btn" class="btn-primary" style="margin-top: 0; padding: 0.5rem; font-size: 0.85rem; background: var(--bg-color); color: var(--text-primary); border: 1px solid var(--border-color); display: flex; align-items: center; justify-content: center; gap: 0.2rem;" title="Importar Lecciones"><span class="material-symbols-outlined">upload</span> Importar</button>
          <input type="file" id="import-file" style="display: none;" accept=".json">
        </div>
      </div>
    </aside>

    <main class="content-area">
      <header class="module-header">
        <div class="header-top">
          <button id="mobile-menu-btn" class="mobile-only-btn" title="Abrir Menú"><span class="material-symbols-outlined">menu</span></button>
          <h2 id="current-module-title">Bienvenido</h2>
        </div>
        <p id="current-module-desc">Selecciona un módulo para comenzar.</p>
      </header>

      <div class="workspace">
        <div class="input-panel">
          <form id="input-form">
            <div id="dynamic-inputs"></div>
            <button type="submit" class="btn-primary" id="submit-btn">Ejecutar Módulo</button>
          </form>
        </div>

        <div class="output-panel">
          <div class="output-header">
            <h3>Respuesta del Profesor</h3>
            <div class="output-actions">
              <button id="copy-btn" class="hidden" title="Copiar al portapapeles"><span class="material-symbols-outlined">content_copy</span></button>
              <button id="save-btn" class="hidden" title="Guardar Lección"><span class="material-symbols-outlined">save</span></button>
            </div>
          </div>
          <div id="output-content" class="markdown-body">
            <p class="placeholder-text">La respuesta aparecerá aquí...</p>
          </div>
          <div id="loading" class="loading hidden">Pensando...</div>
        </div>
      </div>
    </main>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script type="module" src="./main.js"></script>
</body>

</html>
